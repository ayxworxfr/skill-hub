# .pre-commit-config.yaml — git-safety hook 套件模板
# 文档：https://pre-commit.com
# 安装：pip install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg

repos:
  # 通用检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: detect-private-key          # 私钥检测

  # Secret 扫描
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: detect secrets (staged)
        args: ['--staged']

  # Python 格式化（ruff，速度更快）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff          # lint
      - id: ruff-format   # format

  # JS/TS/CSS/JSON/YAML/Markdown 格式化
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, json, yaml, markdown]

  # Go 格式化
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  # Commit message 规范（Conventional Commits）
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, tidy, config, chore, build, ci]
